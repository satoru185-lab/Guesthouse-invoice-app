<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Noto+Serif+JP:wght@600;700&display=swap');

  :root{
    --navy:#152a54;
    --navy-light:#22376b;
    --paper:#ffffff;
    --bg:#eef1f6;
    --line:#c7cede;
    --text:#1c2333;
    --muted:#6b7280;
    --accent:#b8925a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans JP', sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  .app{
    display:flex;
    min-height:100vh;
  }
  .menu-btn{
    display:none;
    background:var(--navy);
    color:#fff;
    border:none;
    width:38px;
    height:38px;
    border-radius:7px;
    font-size:18px;
    cursor:pointer;
    flex-shrink:0;
    align-items:center;
    justify-content:center;
  }
  .overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,15,30,.45);
    z-index:20;
  }
  .overlay.show{ display:block; }
  /* Sidebar */
  .sidebar{
    width:280px;
    flex-shrink:0;
    background:var(--navy);
    color:#fff;
    padding:24px 18px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .brand{
    font-family:'Noto Serif JP', serif;
    font-size:20px;
    font-weight:700;
    letter-spacing:.05em;
    border-bottom:1px solid rgba(255,255,255,.2);
    padding-bottom:14px;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans JP',sans-serif;
    font-size:11px;
    font-weight:400;
    color:rgba(255,255,255,.55);
    margin-top:4px;
    letter-spacing:.02em;
  }
  .nav-btn{
    text-align:left;
    background:transparent;
    border:1px solid rgba(255,255,255,.25);
    color:#fff;
    padding:11px 14px;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
    font-family:inherit;
    transition:background .15s;
  }
  .nav-btn:hover{ background:rgba(255,255,255,.08); }
  .nav-btn.active{ background:var(--accent); border-color:var(--accent); font-weight:600; }

  .sidebar-list{
    flex:1;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:6px;
    margin-top:4px;
  }
  .sidebar-list-title{
    font-size:11px;
    color:rgba(255,255,255,.5);
    letter-spacing:.08em;
    margin-bottom:2px;
  }
  .invoice-item{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.1);
    border-radius:6px;
    padding:9px 10px;
    cursor:pointer;
    font-size:12.5px;
    line-height:1.5;
  }
  .invoice-item:hover{ background:rgba(255,255,255,.13); }
  .invoice-item .who{ font-weight:600; }
  .type-badge{
    display:inline-block;
    font-size:10px;
    font-weight:700;
    padding:1px 6px;
    border-radius:4px;
    background:var(--accent);
    color:#1c2333;
    margin-right:6px;
    vertical-align:middle;
  }
  .invoice-item .meta{ color:rgba(255,255,255,.55); font-size:11px; }
  .empty-note{ color:rgba(255,255,255,.4); font-size:12px; }

  /* Main */
  .main{
    flex:1;
    padding:32px 40px;
    overflow-y:auto;
  }
  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    max-width:900px;
  }
  .toolbar h1{
    font-family:'Noto Serif JP', serif;
    font-size:19px;
    margin:0;
  }
  .btns{ display:flex; gap:8px; }
  button.action{
    background:var(--navy);
    color:#fff;
    border:none;
    padding:9px 16px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
    font-family:inherit;
    font-weight:500;
  }
  button.action.secondary{
    background:#fff;
    color:var(--navy);
    border:1px solid var(--line);
  }
  button.action.danger{
    background:#fff;
    color:#b3435a;
    border:1px solid #e3c3cb;
  }
  button.action:hover{ opacity:.88; }

  .layout{
    display:flex;
    gap:28px;
    align-items:flex-start;
    max-width:1200px;
  }

  /* Form panel */
  .form-panel{
    width:380px;
    flex-shrink:0;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:10px;
    padding:22px;
  }
  .form-section{ margin-bottom:18px; }
  .form-section h3{
    font-size:12px;
    letter-spacing:.06em;
    color:var(--muted);
    margin:0 0 10px;
    text-transform:uppercase;
    border-bottom:1px solid var(--line);
    padding-bottom:6px;
  }
  .field{ margin-bottom:10px; }
  .doctype-toggle{
    display:flex;
    gap:6px;
  }
  .doctype-btn{
    flex:1;
    padding:9px 10px;
    border:1px solid var(--line);
    background:#fbfbfd;
    color:var(--muted);
    border-radius:6px;
    font-size:13px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
  }
  .doctype-btn.active{
    background:var(--navy);
    border-color:var(--navy);
    color:#fff;
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:3px;
  }
  .field input, .field textarea{
    width:100%;
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:5px;
    font-family:inherit;
    font-size:13px;
    background:#fbfbfd;
  }
  .field textarea{ resize:vertical; min-height:40px; }
  .row2{ display:flex; gap:8px; }
  .row2 .field{ flex:1; }

  .item-row{
    border:1px solid var(--line);
    border-radius:7px;
    padding:8px;
    margin-bottom:8px;
  }
  .item-row .row-top{
    display:flex;
    gap:6px;
    margin-bottom:6px;
  }
  .item-row .row-top .i-label{ flex:1 1 40%; }
  .item-row .row-top .i-detail{ flex:1 1 55%; }
  .item-row input{
    padding:6px 7px;
    border:1px solid var(--line);
    border-radius:5px;
    font-size:12.5px;
    font-family:inherit;
    width:100%;
  }
  .item-row .amt{ text-align:right; }
  .amt-row{
    display:flex;
    align-items:center;
    gap:6px;
  }
  .amt-row .i-amount{ flex:1; text-align:right; }
  .calc-row{
    display:flex;
    align-items:center;
    gap:5px;
    flex:1;
    flex-wrap:wrap;
  }
  .calc-row .calc-field{ display:flex; flex-direction:column; gap:2px; flex:1 1 70px; min-width:60px; }
  .calc-row .calc-field label{ font-size:10px; color:var(--muted); }
  .calc-row .fixed-rate{
    padding:6px 7px;
    border:1px solid var(--line);
    border-radius:5px;
    font-size:12.5px;
    background:#eef1f6;
    color:var(--navy);
    font-weight:600;
    text-align:right;
  }
  .calc-row .calc-x{ font-size:13px; color:var(--muted); padding-top:14px; }
  .calc-row .calc-total{
    flex:1 1 90px;
    text-align:right;
    font-size:13px;
    font-weight:700;
    padding-top:14px;
    white-space:nowrap;
  }
  .calc-toggle{
    background:none;
    border:1px solid var(--line);
    color:var(--navy);
    border-radius:5px;
    padding:6px 8px;
    font-size:11px;
    cursor:pointer;
    font-family:inherit;
    white-space:nowrap;
    flex-shrink:0;
  }
  .remove-item{
    background:none;
    border:none;
    color:#b3435a;
    cursor:pointer;
    font-size:16px;
    line-height:1;
    padding:2px 4px;
    flex-shrink:0;
  }
  .add-item{
    background:none;
    border:1px dashed var(--line);
    color:var(--navy);
    padding:6px 10px;
    border-radius:5px;
    font-size:12px;
    cursor:pointer;
    width:100%;
    margin-top:4px;
    font-family:inherit;
  }
  .total-line{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    font-weight:700;
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--line);
  }

  /* Preview */
  .preview-wrap{
    flex:1;
    min-width:0;
  }
  #printArea{
    background:var(--paper);
    width:100%;
    max-width:760px;
    margin:0 auto;
    padding:56px 52px;
    box-shadow:0 2px 18px rgba(20,30,60,.09);
    font-family:'Noto Sans JP', sans-serif;
    color:#111;
  }
  .doc-title{
    text-align:center;
    font-family:'Noto Serif JP', serif;
    font-size:34px;
    font-weight:700;
    letter-spacing:.5em;
    padding-left:.5em;
    color:var(--navy);
    border-top:3px solid var(--navy);
    border-bottom:1px solid var(--navy);
    padding-top:14px;
    padding-bottom:14px;
    margin:0 0 22px;
  }
  .doc-date{
    text-align:right;
    font-size:13px;
    margin-bottom:18px;
  }
  .doc-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
  }
  .client{
    font-size:17px;
    font-weight:600;
    border-bottom:2px solid var(--navy);
    padding-bottom:10px;
    min-width:280px;
  }
  .issuer{
    font-size:12px;
    line-height:1.75;
    text-align:left;
    white-space:pre-line;
  }
  .subject{
    font-size:13px;
    margin:16px 0 18px;
  }
  .amount-box{
    display:flex;
    margin-bottom:14px;
    border:1px solid var(--navy);
  }
  .amount-box .lbl{
    background:var(--navy);
    color:#fff;
    padding:14px 18px;
    font-size:13px;
    display:flex;
    align-items:center;
    white-space:nowrap;
  }
  .amount-box .val{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:700;
    padding:14px;
  }
  .lead-text{ font-size:12.5px; margin:10px 0 14px; }
  .due-box{
    display:flex;
    margin-bottom:20px;
    border:1px solid var(--navy);
    max-width:420px;
  }
  .due-box .lbl{
    background:var(--navy);
    color:#fff;
    padding:11px 16px;
    font-size:13px;
    display:flex;
    align-items:center;
    white-space:nowrap;
  }
  .due-box .val{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    padding:11px;
  }
  .section-label{
    font-size:13px;
    font-weight:700;
    margin:18px 0 8px;
  }
  table.items{
    width:100%;
    border-collapse:collapse;
    font-size:12.5px;
    margin-bottom:6px;
  }
  table.items th{
    background:var(--navy);
    color:#fff;
    padding:8px 6px;
    font-weight:500;
    font-size:12px;
  }
  table.items td{
    border:1px solid var(--line);
    padding:9px 8px;
    height:14px;
  }
  table.items th:first-child, table.items td:first-child{ width:32px; text-align:center; }
  table.items th:last-child, table.items td:last-child{ text-align:right; width:110px; }
  table.items tfoot td{
    background:#e9edf5;
    font-weight:700;
    font-size:14px;
    padding:11px 8px;
  }
  table.items tfoot td:first-child{ text-align:center; }
  .note-line{
    font-size:11px;
    color:#444;
    margin:10px 0 22px;
  }
  .bank-title{
    font-size:13px;
    font-weight:700;
    border-bottom:2px solid var(--navy);
    display:inline-block;
    margin-bottom:10px;
  }
  .bank-box{
    background:#eef1f6;
    padding:16px 18px;
    font-size:13px;
    line-height:2;
  }
  .bank-box .brow{ display:flex; }
  .bank-box .blabel{ width:90px; color:#333; }

  @media print{
    body{ background:#fff; }
  }

  /* ---------- Mobile ---------- */
  @media (max-width: 860px){
    .menu-btn{ display:inline-flex; }
    .sidebar{
      position:fixed;
      top:0; bottom:0; left:0;
      z-index:30;
      width:82vw;
      max-width:320px;
      transform:translateX(-100%);
      transition:transform .22s ease;
      box-shadow:2px 0 24px rgba(0,0,0,.25);
    }
    .sidebar.open{ transform:translateX(0); }

    .main{ padding:16px; width:100%; }
    .toolbar{
      flex-wrap:wrap;
      gap:10px;
      max-width:100%;
    }
    .toolbar h1{ font-size:16px; flex:1; }
    .btns{ flex-wrap:wrap; width:100%; gap:6px; }
    .btns button{ flex:1; min-width:calc(50% - 6px); padding:10px 8px; font-size:12.5px; }

    .layout{ flex-direction:column; gap:16px; max-width:100%; }
    .form-panel{ width:100%; padding:16px; order:1; }
    .preview-wrap{ width:100%; order:2; }

    .row2{ flex-direction:column; gap:0; }
    .item-row .row-top{ flex-direction:column; }
    .calc-row .calc-field{ flex:1 1 45%; }

    #printArea{
      padding:26px 18px;
      max-width:100%;
    }
    .doc-title{
      font-size:22px;
      letter-spacing:.35em;
      padding-left:.35em;
    }
    .doc-top{ flex-direction:column; gap:14px; }
    .client{ min-width:0; width:100%; font-size:15px; }
    .issuer{ font-size:11px; }
    .amount-box .val{ font-size:20px; }
    .amount-box .lbl{ font-size:12px; padding:12px; }
    table.items{ font-size:11px; }
    table.items th, table.items td{ padding:6px 4px; }
    .bank-box{ font-size:12px; padding:14px; }
    .bank-box .blabel{ width:76px; }
  }

  /* ---------- Print (A4) — always wins over the mobile screen rules above ---------- */
  @page{
    size: A4;
    margin: 9mm;
  }
  @media print{
    html, body{ background:#fff !important; width:auto !important; }
    .sidebar, .toolbar, .form-panel, .menu-btn, .overlay{ display:none !important; }
    .app{ display:block !important; }
    .main{ padding:0 !important; width:auto !important; }
    .layout{ display:block !important; max-width:none !important; }
    .preview-wrap{ width:auto !important; }
    #printArea{
      box-shadow:none !important;
      padding:0 !important;
      margin:0 !important;
      max-width:none !important;
      width:100% !important;
      font-size:10pt !important;
    }
    .doc-title{
      font-size:20pt !important;
      letter-spacing:.4em !important;
      padding-left:.4em !important;
      padding-top:5pt !important;
      padding-bottom:5pt !important;
      margin-bottom:9pt !important;
    }
    .doc-date{ font-size:9pt !important; margin-bottom:8pt !important; }
    .doc-top{ flex-direction:row !important; gap:14pt !important; }
    .client{
      min-width:0 !important;
      width:auto !important;
      font-size:11.5pt !important;
      padding-bottom:6pt !important;
    }
    .issuer{ font-size:7.5pt !important; line-height:1.5 !important; }
    .subject{ font-size:9pt !important; margin:6pt 0 8pt !important; }
    .amount-box{ margin-bottom:7pt !important; }
    .amount-box .val{ font-size:17pt !important; padding:7pt !important; }
    .amount-box .lbl{ font-size:9pt !important; padding:7pt 10pt !important; }
    .lead-text{ font-size:8.5pt !important; margin:4pt 0 7pt !important; }
    .due-box .val{ font-size:10pt !important; padding:6pt !important; }
    .due-box .lbl{ font-size:9pt !important; padding:6pt 10pt !important; }
    .section-label{ font-size:9pt !important; margin:8pt 0 4pt !important; }
    table.items{ font-size:8.5pt !important; margin-bottom:4pt !important; }
    table.items th, table.items td{ padding:5pt 5pt !important; }
    table.items tfoot td{ font-size:9.5pt !important; padding:6pt 5pt !important; }
    .note-line{ font-size:7.5pt !important; margin:4pt 0 10pt !important; }
    .bank-title{ font-size:9pt !important; margin-bottom:5pt !important; }
    .bank-box{ font-size:8.5pt !important; padding:8pt 12pt !important; line-height:1.6 !important; }
    .bank-box .blabel{ width:65pt !important; }
  }
</style>
</head>

<script>
const REIWA_START = 2019; // 令和元年 = 2019

function toReiwa(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const y = d.getFullYear();
  const reiwaYear = y - REIWA_START + 1;
  const m = d.getMonth()+1;
  const day = d.getDate();
  return `令和${reiwaYear===1?'元':reiwaYear}年${m}月${day}日`;
}

function yen(n){
  n = Math.round(Number(n)||0);
  return '¥' + n.toLocaleString('ja-JP');
}

function uid(){ return 'inv_' + Date.now() + '_' + Math.random().toString(36).slice(2,8); }

let settings = {
  postal: '386-1431',
  address: '長野県上田市別所温泉1725',
  businessName: 'アースワークスゲストハウス',
  contactName: '若月留美子',
  tel: '080-6937-0304',
  email: 'rumiwb@gmail.com',
  bankName: '82銀行　塩田支店（店番号：319）',
  bankType: '普通',
  bankAccount: '259314',
  bankHolder: 'ワカツキ　ルミコ'
};

let current = null; // current invoice object being edited
let invoices = [];  // list of {id, value} loaded from storage

function blankInvoice(){
  return {
    id: uid(),
    docType: 'invoice',
    date: new Date().toISOString().slice(0,10),
    client: '',
    subject: '',
    dueDate: '',
    items: [
      { label:'宿泊費', detail:'', amount:'', calc:true, rate:'', nights:'', guests:'' },
      { label:'長野県宿泊税', detail:'', amount:'', calc:true, rate:'200', nights:'', guests:'', fixedRate:true }
    ],
    createdAt: new Date().toISOString()
  };
}

function itemAmount(item){
  if(item.calc){
    const guestMult = item.guests ? (Number(item.guests)||0) : 1;
    return (Number(item.rate)||0) * (Number(item.nights)||0) * guestMult;
  }
  return Number(item.amount)||0;
}
function itemDetail(item){
  if(item.calc && item.rate && item.nights){
    if(item.detail && item.detail.trim()) return item.detail;
    if(item.guests) return `1人1泊 ${yen(item.rate)} × ${item.guests}人 × ${item.nights}泊`;
    return `1泊 ${yen(item.rate)} × ${item.nights}泊`;
  }
  return item.detail || '';
}

function total(inv){
  return inv.items.reduce((s,i)=> s + itemAmount(i), 0);
}

/* ---------- storage (browser localStorage — works standalone, e.g. GitHub Pages) ---------- */
const LS_PREFIX = 'seikyuusho_';

async function loadSettings(){
  try{
    const raw = localStorage.getItem(LS_PREFIX + 'settings');
    if(raw){ settings = {...settings, ...JSON.parse(raw)}; }
  }catch(e){ console.error('loadSettings failed', e); }
}
async function saveSettings(){
  try{
    localStorage.setItem(LS_PREFIX + 'settings', JSON.stringify(settings));
    return true;
  }catch(e){
    console.error('saveSettings failed', e);
    return false;
  }
}
async function loadInvoices(){
  try{
    const raw = localStorage.getItem(LS_PREFIX + 'invoice-ids');
    const ids = raw ? JSON.parse(raw) : [];
    invoices = [];
    for(const id of ids){
      try{
        const raw2 = localStorage.getItem(LS_PREFIX + 'invoice:' + id);
        if(raw2) invoices.push(JSON.parse(raw2));
      }catch(e){}
    }
    invoices.sort((a,b)=> (b.createdAt||'').localeCompare(a.createdAt||''));
  }catch(e){ invoices = []; }
}
async function persistInvoice(inv){
  try{
    localStorage.setItem(LS_PREFIX + 'invoice:' + inv.id, JSON.stringify(inv));
    let ids = invoices.map(i=>i.id);
    if(!ids.includes(inv.id)) ids.unshift(inv.id);
    localStorage.setItem(LS_PREFIX + 'invoice-ids', JSON.stringify(ids));
    return true;
  }catch(e){
    console.error('persistInvoice failed', e);
    return false;
  }
}
async function deleteInvoiceStorage(id){
  try{
    localStorage.removeItem(LS_PREFIX + 'invoice:' + id);
    const ids = invoices.filter(i=>i.id!==id).map(i=>i.id);
    localStorage.setItem(LS_PREFIX + 'invoice-ids', JSON.stringify(ids));
    return true;
  }catch(e){
    console.error('deleteInvoiceStorage failed', e);
    return false;
  }
}

/* ---------- rendering: sidebar list ---------- */
function renderList(){
  const el = document.getElementById('invoiceList');
  if(invoices.length===0){
    el.innerHTML = '<div class="empty-note">まだ保存された請求書はありません</div>'
      + '<button class="add-item" id="loadSampleBtn" style="color:#fff;border-color:rgba(255,255,255,.35);margin-top:8px;">サンプル請求書を読み込む</button>';
    const sbtn = document.getElementById('loadSampleBtn');
    if(sbtn) sbtn.addEventListener('click', async ()=>{
      sbtn.textContent = '読み込み中…';
      const ok = await persistInvoice(sampleInvoice());
      if(!ok){
        sbtn.textContent = '保存に失敗しました（再試行）';
        return;
      }
      await loadInvoices();
      current = invoices[0] ? JSON.parse(JSON.stringify(invoices[0])) : blankInvoice();
      renderAll();
    });
    return;
  }
  el.innerHTML = invoices.map(inv=>{
    const t = total(inv);
    const badge = inv.docType === 'estimate' ? '見積' : '請求';
    return `<div class="invoice-item" data-id="${inv.id}">
      <div class="who"><span class="type-badge">${badge}</span>${inv.client || '（宛先未入力）'}</div>
      <div class="meta">${toReiwa(inv.date)} ・ ${yen(t)}</div>
    </div>`;
  }).join('');
  el.querySelectorAll('.invoice-item').forEach(node=>{
    node.addEventListener('click', ()=>{
      const inv = invoices.find(i=>i.id===node.dataset.id);
      if(inv){ current = JSON.parse(JSON.stringify(inv)); renderAll(); }
      closeSidebar();
    });
  });
}

/* ---------- rendering: form panel ---------- */
function renderForm(){
  const panel = document.getElementById('formPanel');
  const isSaved = invoices.some(i=>i.id===current.id);
  const docLabel = current.docType === 'estimate' ? '見積書' : '請求書';
  document.getElementById('panelTitle').textContent = isSaved ? `${docLabel}を編集` : `新規${docLabel}`;
  document.getElementById('duplicateBtn').style.display = isSaved ? 'inline-block' : 'none';
  document.getElementById('deleteBtn').style.display = isSaved ? 'inline-block' : 'none';

  panel.innerHTML = `
    <div class="form-section">
      <h3>書類の種類</h3>
      <div class="doctype-toggle">
        <button type="button" class="doctype-btn ${current.docType!=='estimate' ? 'active' : ''}" data-type="invoice">請求書</button>
        <button type="button" class="doctype-btn ${current.docType==='estimate' ? 'active' : ''}" data-type="estimate">見積書</button>
      </div>
    </div>

    <div class="form-section">
      <h3>宛先・件名</h3>
      <div class="field"><label>宛先（お客様名）</label><input id="f_client" value="${escAttr(current.client)}" placeholder="山田 太郎 様"></div>
      <div class="field"><label>件名</label><input id="f_subject" value="${escAttr(current.subject)}" placeholder="宿泊費のご請求"></div>
      <div class="row2">
        <div class="field"><label>請求日</label><input type="date" id="f_date" value="${current.date}"></div>
        <div class="field"><label>支払い期日</label><input type="date" id="f_due" value="${current.dueDate}"></div>
      </div>
    </div>

    <div class="form-section">
      <h3>ご請求内容</h3>
      <div id="itemsWrap"></div>
      <button class="add-item" id="addItemBtn">＋ 項目を追加</button>
      <div class="total-line"><span>合計（税込）</span><span id="totalDisplay">${yen(total(current))}</span></div>
    </div>
  `;

  renderItems();

  panel.querySelectorAll('.doctype-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      current.docType = btn.dataset.type;
      renderForm();
      renderPreview();
    });
  });
  document.getElementById('f_client').addEventListener('input', e=>{ current.client=e.target.value; renderPreview(); });
  document.getElementById('f_subject').addEventListener('input', e=>{ current.subject=e.target.value; renderPreview(); });
  document.getElementById('f_date').addEventListener('input', e=>{ current.date=e.target.value; renderPreview(); });
  document.getElementById('f_due').addEventListener('input', e=>{ current.dueDate=e.target.value; renderPreview(); });
  document.getElementById('addItemBtn').addEventListener('click', ()=>{
    current.items.push({label:'', detail:'', amount:'', calc:false, rate:'', nights:''});
    renderItems(); renderPreview();
  });
}

function renderItems(){
  const wrap = document.getElementById('itemsWrap');
  wrap.innerHTML = current.items.map((it,idx)=>{
    const rateField = it.fixedRate
      ? `<div class="calc-field"><label>単価（1泊・固定）</label><div class="fixed-rate">${yen(it.rate)}</div></div>`
      : `<div class="calc-field"><label>単価（1泊）</label><input class="i-rate" inputmode="numeric" placeholder="例：40000" value="${it.rate}"></div>`;
    const amtCell = it.calc ? `
      <div class="calc-row">
        ${rateField}
        <div class="calc-x">×</div>
        <div class="calc-field"><label>人数（任意）</label><input class="i-guests" inputmode="numeric" placeholder="任意" value="${it.guests||''}"></div>
        <div class="calc-x">×</div>
        <div class="calc-field"><label>泊数</label><input class="i-nights" inputmode="numeric" placeholder="例：2" value="${it.nights}"></div>
        <div class="calc-total">${yen(itemAmount(it))}</div>
        <button class="calc-toggle" title="金額を直接入力する">直接入力</button>
      </div>` : `
      <div class="amt-row">
        <input class="i-amount amt" placeholder="金額" inputmode="numeric" value="${it.amount}">
        <button class="calc-toggle" title="単価×泊数で自動計算する">単価×泊数</button>
      </div>`;
    return `
    <div class="item-row" data-idx="${idx}">
      <div class="row-top">
        <input class="i-label" placeholder="内訳（例：宿泊費）" value="${escAttr(it.label)}">
        <input class="i-detail" placeholder="内容（例：1泊40,000円×2日）" value="${escAttr(it.detail)}">
      </div>
      <div class="row-bottom" style="display:flex; align-items:center; gap:6px;">
        ${amtCell}
        <button class="remove-item" title="削除">×</button>
      </div>
    </div>`;
  }).join('');

  const rows = Array.from(wrap.querySelectorAll('.item-row'));

  // 泊数 (nights of stay) is the same for every line on one invoice, so
  // keep it in sync across all calculator rows without rebuilding the DOM
  // (rebuilding would drop focus mid-keystroke).
  function syncNightsAcross(sourceIdx, value){
    current.items.forEach((it, i)=>{
      if(i===sourceIdx || !it.calc) return;
      it.nights = value;
      const otherRow = rows[i];
      if(!otherRow) return;
      const otherNightsInput = otherRow.querySelector('.i-nights');
      if(otherNightsInput) otherNightsInput.value = value;
      const otherTotal = otherRow.querySelector('.calc-total');
      if(otherTotal) otherTotal.textContent = yen(itemAmount(it));
    });
  }

  rows.forEach(row=>{
    const idx = Number(row.dataset.idx);
    row.querySelector('.i-label').addEventListener('input', e=>{ current.items[idx].label=e.target.value; renderPreview(); });
    row.querySelector('.i-detail').addEventListener('input', e=>{ current.items[idx].detail=e.target.value; renderPreview(); });

    const amountInput = row.querySelector('.i-amount');
    if(amountInput){
      amountInput.addEventListener('input', e=>{
        current.items[idx].amount = e.target.value.replace(/[^0-9]/g,'');
        e.target.value = current.items[idx].amount;
        document.getElementById('totalDisplay').textContent = yen(total(current));
        renderPreview();
      });
    }
    const rateInput = row.querySelector('.i-rate');
    const nightsInput = row.querySelector('.i-nights');
    const guestsInput = row.querySelector('.i-guests');
    if(nightsInput){
      // Read every field straight from the DOM at compute time so the total
      // can never be based on a stale value, regardless of which field
      // triggered the update.
      const recompute = (syncNights)=>{
        const item = current.items[idx];
        if(rateInput) item.rate = rateInput.value.replace(/[^0-9]/g,'');
        item.nights = nightsInput.value.replace(/[^0-9]/g,'');
        if(guestsInput) item.guests = guestsInput.value.replace(/[^0-9]/g,'');
        if(rateInput) rateInput.value = item.rate;
        nightsInput.value = item.nights;
        if(guestsInput) guestsInput.value = item.guests;
        row.querySelector('.calc-total').textContent = yen(itemAmount(item));
        if(syncNights) syncNightsAcross(idx, item.nights);
        document.getElementById('totalDisplay').textContent = yen(total(current));
        renderPreview();
      };
      if(rateInput) rateInput.addEventListener('input', ()=>recompute(false));
      nightsInput.addEventListener('input', ()=>recompute(true));
      if(guestsInput) guestsInput.addEventListener('input', ()=>recompute(false));
    }
    const calcToggle = row.querySelector('.calc-toggle');
    if(calcToggle){
      calcToggle.addEventListener('click', ()=>{
        const item = current.items[idx];
        if(item.calc){
          // switching to manual: carry over the computed total as the starting amount
          item.amount = String(itemAmount(item) || '');
          item.calc = false;
        } else {
          item.calc = true;
          // pick up whatever nights value is already set on another calc line
          const sibling = current.items.find((it,i)=> i!==idx && it.calc && it.nights);
          if(sibling && !item.nights) item.nights = sibling.nights;
        }
        renderItems(); renderPreview();
      });
    }
    row.querySelector('.remove-item').addEventListener('click', ()=>{
      current.items.splice(idx,1);
      if(current.items.length===0) current.items.push({label:'',detail:'',amount:'',calc:false,rate:'',nights:''});
      renderItems(); renderPreview();
    });
  });
}

function escAttr(s){
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}
function escHtml(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

      <div class="issuer">${escHtml(settings.postal)}
${escHtml(settings.address)}
${escHtml(settings.businessName)}
${escHtml(settings.contactName)}
Tel：${escHtml(settings.tel)}
Email：${escHtml(settings.email)}</div>
    </div>

    <div class="amount-box">
      <div class="lbl">ご請求金額（税込）</div>
      <div class="val">${yen(t)}</div>
    </div>
    <div class="lead-text">下記のとおりご請求申し上げます。</div>
    <div class="due-box">
      <div class="lbl">支払い期日</div>
      <div class="val">${current.dueDate ? toReiwa(current.dueDate) : ''}</div>
    </div>
    <div class="section-label">■ご請求内容</div>
    <table class="items">
      <thead><tr><th>No.</th><th>内訳</th><th>内容</th><th>金額（税込）</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr><td colspan="3">合計（税込）</td><td>${yen(t)}</td></tr></tfoot>

      <div class="brow"><div class="blabel">口座名義</div><div>：　${escHtml(settings.bankHolder)}</div></div>

    <div class="form-section">

    </div>
    <button class="action" id="saveSettingsBtn" style="width:100%;">設定を保存</button>
  `;
  const ids = ['postal','address','business','contact','tel','email','bankName','bankType','bankAccount','bankHolder'];
  const keyMap = {business:'businessName', contact:'contactName'};
  document.getElementById('saveSettingsBtn').addEventListener('click', async ()=>{
    ids.forEach(id=>{

/* ---------- PDF generation + email/share ---------- */
async function renderPrintAreaAsDesktop(){
  // html2canvas just screenshots whatever layout is currently on screen —
  // on a phone that's the narrow mobile layout, not the A4-shaped one.
  // CSS media queries key off the actual browser viewport, so we can't
  // just resize a hidden clone in the same page. Instead, render into an
  // off-screen iframe that's wide enough that the mobile breakpoint never
  // applies, giving the same layout you'd get printing from a desktop.
  const styleTags = Array.from(document.querySelectorAll('style')).map(s => s.textContent).join('\n');
  const printAreaHtml = document.getElementById('printArea').outerHTML;

  const iframe = document.createElement('iframe');
  iframe.style.position = 'fixed';
  iframe.style.left = '-10000px';
  iframe.style.top = '0';
  iframe.style.width = '900px';
  iframe.style.height = '1400px';
  iframe.style.border = 'none';
  document.body.appendChild(iframe);

  await new Promise(resolve=>{
    iframe.onload = resolve;
    iframe.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8">
      <style>${styleTags}</style>
      <style>body{ margin:0; background:#fff; } #printArea{ margin:0 auto; }</style>
      </head><body>${printAreaHtml}</body></html>`;
  });

  const doc = iframe.contentDocument;
  try{
    if(doc.fonts && doc.fonts.ready) await doc.fonts.ready;
  }catch(e){ /* ignore font-loading check failures */ }
  await new Promise(r=>setTimeout(r, 150));

  const node = doc.getElementById('printArea');
  const canvas = await window.html2canvas(node, { scale: 2, backgroundColor: '#ffffff', useCORS: true });
  document.body.removeChild(iframe);
  return canvas;
}

async function generateInvoicePdf(){
  if(typeof window.html2canvas === 'undefined' || typeof window.jspdf === 'undefined'){
    throw new Error('PDF libraries not loaded');
  }
  const canvas = await renderPrintAreaAsDesktop();
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageWidth = pdf.internal.pageSize.getWidth();
  const pageHeight = pdf.internal.pageSize.getHeight();
  const margin = 10;
  const maxWidth = pageWidth - margin * 2;
  const maxHeight = pageHeight - margin * 2;
  let renderWidth = maxWidth;
  let renderHeight = (canvas.height * renderWidth) / canvas.width;
  if(renderHeight > maxHeight){
    renderHeight = maxHeight;
    renderWidth = (canvas.width * renderHeight) / canvas.height;
  }
  const x = (pageWidth - renderWidth) / 2;
  const y = margin;
  pdf.addImage(imgData, 'PNG', x, y, renderWidth, renderHeight);
  return pdf.output('blob');
}

function invoiceFileName(){
  const docLabel = current.docType === 'estimate' ? '見積書' : '請求書';
  const who = (current.client || 'invoice').replace(/[\\/:*?"<>|\s]+/g, '');
  const d = current.date || '';
  return `${docLabel}_${who}_${d}.pdf`;
}

document.getElementById('emailBtn').addEventListener('click', async ()=>{
  const btn = document.getElementById('emailBtn');
  const originalText = btn.textContent;
  btn.textContent = 'PDF作成中…';
  btn.disabled = true;
  try{
    const blob = await generateInvoicePdf();
    const filename = invoiceFileName();
    const file = new File([blob], filename, { type: 'application/pdf' });
    const docLabel = current.docType === 'estimate' ? '見積書' : '請求書';
    const subjectLine = `${current.client || ''} 様への${docLabel}（${current.subject || ''}）`;

    if(navigator.canShare && navigator.canShare({ files: [file] })){
      await navigator.share({
        files: [file],
        title: subjectLine
      });
    } else {
      // Fallback for browsers without file-sharing support: download the PDF
      // and open a pre-filled email draft so it can be attached manually.
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=> URL.revokeObjectURL(url), 2000);

      const subject = encodeURIComponent(subjectLine);
      window.location.href = `mailto:?subject=${subject}`;
    }
  }catch(e){
    if(e.name !== 'AbortError'){
      console.error('email invoice failed', e);
      alert('PDFの作成に失敗しました。通信状況をご確認の上、もう一度お試しください。');
    }
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
});
